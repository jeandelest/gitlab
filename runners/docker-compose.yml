services:
  gitlab-runner:
    image: gitlab/gitlab-runner:16-alpine
    container_name: gitlab-runner
    restart: always
    env_file:
      - .env
    volumes:
      - ./config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    healthcheck:
      test: ["CMD", "gitlab-runner", "verify"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      bash -c "
        if [ ! -f /etc/gitlab-runner/config.toml ]; then
          gitlab-runner register --non-interactive \
            --url $GITLAB_URL \
            --registration-token $REGISTRATION_TOKEN \
            --executor docker \
            --description $RUNNER_NAME \
            --tag-list $RUNNER_TAGS \
            --docker-image alpine:latest \
            --run-untagged=true \
            --locked=false;
        fi;
        gitlab-runner run
      "
